<script type="text/javascript">

		
	var sendvisitinfo = function(type,page){};

	(function() {
		function centerTopLogo() {
			var logoBar = document.getElementById("logoBar");
			if (logoBar) {
				logoBar.style.left = "50%";
				logoBar.style.transform = "translateX(-50%)";
			}

			var desktopLogo = document.querySelector(".catalog_logo");
			if (desktopLogo) {
				desktopLogo.style.left = "50%";
				desktopLogo.style.transform = "translateX(-50%)";
			}

			var topLogoImg = document.querySelector('#logoBar img[src*="appLogoIcon"]');
			if (topLogoImg) {
				topLogoImg.style.left = "50%";
				topLogoImg.style.transform = "translateX(-50%)";
			}

			var phoneLogoImg = document.querySelector('.phoneTopBar .button img[src*="appLogoIcon"]');
			if (phoneLogoImg && phoneLogoImg.parentElement) {
				phoneLogoImg.parentElement.style.left = "50%";
				phoneLogoImg.parentElement.style.transform = "translateX(-50%)";
			}
		}

		var bgAudio = document.createElement("audio");
		bgAudio.id = "bgmAudio";
		bgAudio.src = "files/RUNWAY.MP3";
		bgAudio.loop = true;
		bgAudio.autoplay = true;
		bgAudio.preload = "auto";
		bgAudio.volume = 0.3;
		bgAudio.setAttribute("autoplay", "autoplay");
		bgAudio.setAttribute("playsinline", "playsinline");

		var toggleBtn = document.createElement("button");
		toggleBtn.id = "bgmToggle";
		toggleBtn.type = "button";
		toggleBtn.title = "Pausar música";
		toggleBtn.setAttribute("aria-label", "Pausar música");
		toggleBtn.innerHTML = "||";

		function syncButton(isPlaying) {
			toggleBtn.innerHTML = isPlaying ? "||" : "&#9658;";
			toggleBtn.title = isPlaying ? "Pausar música" : "Tocar música";
			toggleBtn.setAttribute("aria-label", isPlaying ? "Pausar música" : "Tocar música");
		}

		function playAudio() {
			var p = bgAudio.play();
			if (p && typeof p.then === "function") {
				p.then(function() {
					syncButton(true);
				}).catch(function() {
					syncButton(false);
				});
			} else {
				syncButton(!bgAudio.paused);
			}
		}

		toggleBtn.addEventListener("click", function() {
			if (bgAudio.paused) {
				playAudio();
			} else {
				bgAudio.pause();
				syncButton(false);
			}
		});

		document.addEventListener("DOMContentLoaded", function() {
			document.body.appendChild(bgAudio);
			document.body.appendChild(toggleBtn);
			playAudio();
			centerTopLogo();
			window.setTimeout(centerTopLogo, 300);
			window.setTimeout(centerTopLogo, 1200);
			window.addEventListener("resize", centerTopLogo);

			var unlock = function() {
				if (bgAudio.paused) {
					playAudio();
				}
				document.removeEventListener("click", unlock);
				document.removeEventListener("touchstart", unlock);
			};
			document.addEventListener("click", unlock, { passive: true });
			document.addEventListener("touchstart", unlock, { passive: true });
		});
	})();
	
</script>
